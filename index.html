          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Nombre" style={{...inp(),flex:1,minWidth:100,padding:"8px 10px"}}/>
          <input value={newEmail} onChange={e=>setNewEmail(e.target.value)} placeholder="correo@ejemplo.com" type="email" style={{...inp(),flex:2,minWidth:140,padding:"8px 10px"}}/>
          <button onClick={addManual} style={{background:apc,color:"#FFF",border:"none",padding:"8px 14px",borderRadius:9,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>+ Agregar</button>
        </div>
      </div>}
    </div>
  );
}

/* ─── AGENDAMIENTO TAB ──────────────────────────────────────────── */
function AgendamientoTab({agendamientos,deleteAgendamiento,updateAgendamiento,regs,pendientes,cfg,apc,highlightedAg}){
  const [expandedId,setExpandedId]=useState(null);
  const [editId,setEditId]=useState(null);
  const [editFecha,setEditFecha]=useState("");
  const [editHora,setEditHora]=useState("");
  const [confirmDelId,setConfirmDelId]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const [sending,setSending]=useState(null);
  const [sent,setSent]=useState(null);
  const [agView,setAgView]=useState("pendientes"); // pendientes | enviados

  const sorted=[...agendamientos].sort((a,b)=>new Date(a.fechaHora)-new Date(b.fechaHora));
  const listaPendientes=sorted.filter(ag=>!ag.ejecutado);
  const listaEnviados=sorted.filter(ag=>ag.ejecutado);
  const listaActual=agView==="pendientes"?listaPendientes:listaEnviados;

  const fmtFecha=dt=>{
    const d=new Date(dt);
    return d.toLocaleDateString("es",{day:"2-digit",month:"long",year:"numeric"})+" - "+d.toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"});
  };

  const sendAgendamiento=async(ag)=>{
    setSending(ag.id);
    let ok=0;
    for(const r of (ag.registros||[])){
      const fullReg=regs.find(x=>x.id===r.id)||r;
      if(!fullReg.email)continue;
      try{await sendReminderEmailJS(fullReg,cfg);ok++;}catch{}
    }
    await updateAgendamiento(ag.id,{ejecutado:true,ejecutadoEn:new Date().toISOString()});
    setSending(null);
    setSent(ag.id);
    setTimeout(()=>setSent(null),3000);
  };

  const startEdit=ag=>{
    const dt=new Date(ag.fechaHora);
    const yyyy=dt.getFullYear();
    const mm=String(dt.getMonth()+1).padStart(2,"0");
    const dd=String(dt.getDate()).padStart(2,"0");
    const hh=String(dt.getHours()).padStart(2,"0");
    const min=String(dt.getMinutes()).padStart(2,"0");
    setEditFecha(`${yyyy}-${mm}-${dd}`);
    setEditHora(`${hh}:${min}`);
    setEditId(ag.id);
  };

  const [savingEdit,setSavingEdit]=useState(false);
  const [editErr,setEditErr]=useState(false);
  const saveEdit=async()=>{
    if(!editFecha||savingEdit)return;
    setSavingEdit(true);setEditErr(false);
    try{
      const hora=editHora||"00:00";
      const [y,mo,d]=editFecha.split("-").map(Number);
      const [h,mi]=hora.split(":").map(Number);
      const dt=new Date(y,mo-1,d,h||0,mi||0,0);
      await updateAgendamiento(editId,{fechaHora:dt.toISOString()});
      setEditId(null);
    }catch(e){
      console.error('Error guardando fecha:',e);
      setEditErr(true);
      setTimeout(()=>setEditErr(false),4000);
    }
    finally{setSavingEdit(false);}
  };

  return(
    <div>
      {/* Sub-tabs Pendientes / Enviados */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={()=>setAgView("pendientes")} style={{padding:"8px 16px",border:agView==="pendientes"?"none":"1.5px solid #E4DFF5",borderRadius:10,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,background:agView==="pendientes"?`${apc}15`:"#FFF",color:agView==="pendientes"?apc:"#8880AA",transition:"all .2s"}}>
          📅 Pendientes {listaPendientes.length>0&&<span style={{background:apc,color:"#FFF",borderRadius:20,padding:"1px 7px",fontSize:11,marginLeft:4}}>{listaPendientes.length}</span>}
        </button>
        <button onClick={()=>setAgView("enviados")} style={{padding:"8px 16px",border:agView==="enviados"?"none":"1.5px solid #E4DFF5",borderRadius:10,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,background:agView==="enviados"?`${apc}15`:"#FFF",color:agView==="enviados"?apc:"#8880AA",transition:"all .2s"}}>
          ✅ Enviados {listaEnviados.length>0&&<span style={{background:"#3DAB7A",color:"#FFF",borderRadius:20,padding:"1px 7px",fontSize:11,marginLeft:4}}>{listaEnviados.length}</span>}
        </button>
      </div>
      {listaActual.length===0&&(
        <div style={{textAlign:"center",padding:"40px 0",color:"#C4BEDB",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
          <div style={{fontSize:40,marginBottom:12}}>{agView==="pendientes"?"📅":"✅"}</div>
          <p>{agView==="pendientes"?"No hay agendamientos pendientes.":"No hay agendamientos enviados aún."}</p>
          {agView==="pendientes"&&<p style={{fontSize:12,marginTop:6}}>Crea uno desde Registros → 🔔 Recordatorio → Agendar reenvío</p>}
        </div>
      )}
      {pendientes.length>0&&agView==="pendientes"&&(
        <div style={{background:"#FFF3CD",borderRadius:12,padding:"12px 16px",marginBottom:16,border:"1px solid #FFC107",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:20}}>⏰</span>
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,color:"#856404",flex:1}}>
            {pendientes.length} agendamiento(s) listo(s) para enviar. Ábrelos abajo y presiona "Enviar ahora".
          </p>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {listaActual.map(ag=>{
          const isPending=pendientes.find(p=>p.id===ag.id);
          const isExpanded=expandedId===ag.id;
          const isEditing=editId===ag.id;
          return(
            <div key={ag.id} style={{borderRadius:14,border:`2px solid ${ag.ejecutado?"#C3F0D6":isPending?"#FFC107":"#EDE9F8"}`,overflow:"hidden",background:ag.ejecutado?"#F0FFF7":isPending?"#FFFBEA":"#FFF"}}>
              {/* Header del lote */}
              <div id={`ag-row-${ag.id}`} onClick={()=>setExpandedId(isExpanded?null:ag.id)} className={highlightedAg===ag.id?"reg-highlight":""} style={{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",background:highlightedAg===ag.id?"":"transparent",transition:"background 0.2s ease"}}>
                <span style={{fontSize:18}}>{ag.ejecutado?"✅":isPending?"⏰":"📅"}</span>
                {isEditing?(
                  <div style={{display:"flex",gap:8,flex:1,alignItems:"center",flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
                    <input type="date" value={editFecha} onChange={e=>setEditFecha(e.target.value)} style={{...inp(),flex:1,minWidth:120,padding:"8px 10px"}}/>
                    <input type="time" value={editHora} onChange={e=>setEditHora(e.target.value)} style={{...inp(),width:110,padding:"8px 10px"}}/>
                    <button onClick={saveEdit} disabled={savingEdit} style={{background:editErr?"#E55B5B":savingEdit?"#A0D8B3":"#3DAB7A",color:"#FFF",border:"none",padding:"8px 14px",borderRadius:9,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:savingEdit?"not-allowed":"pointer"}}>{savingEdit?"Guardando...":editErr?"❌ Error":"✓ Guardar"}</button>
                    <button onClick={()=>{setEditId(null);setEditErr(false);}} style={{...ghostBtn(),padding:"8px 12px"}}>✕</button>
                  </div>
                ):(
                  <div style={{flex:1}}>
                    <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:800,color:"#1A1535",marginBottom:2}}>
                      Agendamiento {fmtFecha(ag.fechaHora)}
                    </p>
                    <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,color:"#8880AA"}}>
                      {ag.total||0} destinatario(s) · {ag.ejecutado?"Enviado ✅":isPending?"Listo para enviar":"Programado"}
                    </p>
                  </div>
                )}
                {!isEditing&&(
                  <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                    {!ag.ejecutado&&isPending&&(
                      <button onClick={()=>sendAgendamiento(ag)} disabled={sending===ag.id} style={{background:"#3DAB7A",color:"#FFF",border:"none",padding:"7px 12px",borderRadius:9,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                        {sending===ag.id?"Enviando...":sent===ag.id?"✅ Enviado":"📧 Enviar ahora"}
                      </button>
                    )}
                    {!ag.ejecutado&&<button onClick={()=>startEdit(ag)} style={{background:"#F0EDF8",border:"none",borderRadius:9,padding:"7px 10px",cursor:"pointer",fontSize:14}}>✏️</button>}
                    <button onClick={()=>setConfirmDelId(ag.id)} style={{background:"#FFF0F0",border:"none",borderRadius:9,padding:"7px 10px",cursor:"pointer",fontSize:14}}>🗑</button>
                  </div>
                )}
              </div>
              {/* Detalle expandido con edición de destinatarios */}
              {isExpanded&&(
                <EditableRecipients ag={ag} updateAgendamiento={updateAgendamiento} regs={regs} apc={apc} readOnly={!!ag.ejecutado}/>
              )}
            </div>
          );
        })}
      </div>
      {/* Confirmar eliminar */}
      {confirmDelId&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:99999,padding:20}}>
          <div style={{background:"#FFF",borderRadius:18,padding:"28px 26px",maxWidth:340,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑</div>
            <h3 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:18,color:"#1A1535",marginBottom:8}}>¿Eliminar agendamiento?</h3>
            <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:"#8880AA",marginBottom:22}}>Esta acción no se puede deshacer.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={async()=>{setDeleting(true);try{await deleteAgendamiento(confirmDelId);}catch(e){console.error(e);}finally{setDeleting(false);setConfirmDelId(null);}}} disabled={deleting} style={{background:deleting?"#F5A5A5":"#E55B5B",color:"#FFF",border:"none",padding:"11px 20px",borderRadius:11,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:700,cursor:deleting?"not-allowed":"pointer",flex:1}}>{deleting?"Eliminando...":"Eliminar"}</button>
              <button onClick={()=>setConfirmDelId(null)} style={{...ghostBtn(),flex:1}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

              <div style={{display:"flex",gap:10}}>
                <input type="email" value={testEmail} onChange={e=>setTestEmail(e.target.value)} placeholder="correo@ejemplo.com" style={{...inp(),flex:1}}/>
                <button onClick={testEJ} disabled={testStatus!=="idle"} style={{background:testStatus==="sent"?"#3DAB7A":apc,color:"#FFF",border:"none",padding:"12px 18px",borderRadius:11,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",transition:"all .2s"}}>
                  {testStatus==="sending"?"Enviando...":testStatus==="sent"?"✅ Enviado":testStatus==="err"?"⚠️ Error":"Enviar prueba"}
                </button>
              </div>
              {testStatus==="err"&&<p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,color:"#E55B5B",marginTop:8}}>Verifica que el Service ID, Template ID y Public Key sean correctos.</p>}
            </div>
          </div>
        )}
        {sub==="agendamiento"&&(
          <AgendamientoTab agendamientos={agendamientos} deleteAgendamiento={deleteAgendamiento} updateAgendamiento={updateAgendamiento} regs={regs} pendientes={pendientes} cfg={cfg} apc={apc} highlightedAg={highlightedAg}/>
        )}
        {sub==="firebase"&&(
          <div>
            <h3 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:17,color:"#1A1535",marginBottom:12}}>🔥 Configuración de Firebase</h3>
            <div style={{background:"#FFF7ED",borderRadius:12,padding:"16px 18px",marginBottom:20,border:"1px solid #FED7AA"}}>
              <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:800,color:"#C2410C",marginBottom:10}}>📋 Pasos para conectar Firebase (solo 5 minutos):</p>
              <ol style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:"#7C2D12",paddingLeft:18,lineHeight:2.1,margin:0}}>
                <li>Ve a <strong>console.firebase.google.com</strong> e inicia sesión con tu cuenta Google</li>
                <li>Haz clic en <strong>"Agregar proyecto"</strong>, ponle un nombre (ej: "rsvp-boda") y sigue los pasos</li>
                <li>En el panel del proyecto, haz clic en el icono <strong>{"</>"}</strong> (Web) para registrar la app</li>
                <li>Copia el objeto <code style={{background:"#FEF3C7",padding:"2px 5px",borderRadius:4,fontSize:12}}>firebaseConfig</code> que te dan y pégalo en el archivo HTML reemplazando los valores de configuración al inicio del script</li>
                <li>En el menú izquierdo ve a <strong>Firestore Database</strong> → "Crear base de datos" → Modo de prueba → Ubicación: <strong>us-east1</strong></li>
                <li>¡Listo! Todo se guardará automáticamente en la nube 🎉</li>
              </ol>
            </div>
            <div style={{background:"#F0FFF4",borderRadius:12,padding:"14px 16px",border:"1px solid #BBF7D0"}}>
              <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,color:"#166534",marginBottom:6}}>✅ Estado de conexión</p>
              <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:"#166534"}}>
                {window.__firebaseReady?"🟢 Firebase conectado correctamente":"🔴 Firebase no conectado — revisa la configuración en el HTML"}
              </p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── ROOT APP ───────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState("landing");
  const [cfg,setCfg]=useState(null);
  const [regs,setRegs]=useState([]);
  const [agendamientos,setAgendamientos]=useState([]);
  const [ready,setReady]=useState(false);
  const [authed,setAuthed]=useState(false);

  useEffect(()=>{
    (async()=>{
      await waitFirebase();
      const c=await fStore(DEF_CFG);
      // Solo poner defaults si no existen en absoluto
      if(!c.confirmMsgNo){
        c.confirmMsgNo="{{Nombre}}, Muchas gracias por notificarnos que no podrás asistir. Agradecemos muchisimo que te hayas tomado el tiempo de responder el formulario para ayudarnos con la organización. Aun asi, si cambias de parecer o cualquier cosa surge, avisanos y llena nuevamente el formulario. Saludos: Amir y Karen";
      }
      if(!c.asistira||c.asistira.length===0){
        c.asistira=[
          {id:mkId(),label:"Sí",color:"#3DAB7A"},
          {id:mkId(),label:"No",color:"#E55B5B"},
        ];
      }
      // Migrar mensajes viejos al formato por id
      if(c.asistira){
        c.asistira.forEach(opt=>{
          const key=`confirmMsg_${opt.id}`;
          if(!c[key]){
            if(opt.label==="Sí"&&c.confirmMsgSi)c[key]=c.confirmMsgSi;
            else if(opt.label==="No"&&c.confirmMsgNo)c[key]=c.confirmMsgNo;
            else if(opt.label==="No estoy seguro/a"&&c.confirmMsgNoSeguro)c[key]=c.confirmMsgNoSeguro;
          }
        });
      }
      setCfg(c);
      setReady(true);
    })();

    // Real-time listeners
    let unsub=null, unsubCfg=null, unsubAg=null, unsubAuth=null;
    waitFirebase().then(()=>{
      if(window.__firebase){
        unsub=window.__firebase.onRegsSnapshot(docs=>setRegs(docs));
        unsubCfg=window.__firebase.onCfgSnapshot(c=>setCfg({...DEF_CFG,...c}));
        // Firebase Auth state listener — fuente de verdad para authed
        // Suscribimos agendamientos solo cuando el usuario está autenticado
        unsubAuth=window.__firebase.onAuthChanged(user=>{
          setAuthed(!!user);
          if(user){
            // Suscribir agendamientos ahora que hay auth
            if(unsubAg)unsubAg();
            unsubAg=window.__firebase.onAgendamientosSnapshot(docs=>setAgendamientos(docs));
          } else {
            // Desuscribir y limpiar agendamientos al cerrar sesión
            if(unsubAg){unsubAg();unsubAg=null;}
            setAgendamientos([]);
            setView(v=>{if(v==="admin")return "landing";return v;});
          }
        });
      }
    });

    const onHash=()=>{
      const h=window.location.hash;
      if(h==="#admin")setView("admin");
      else if(h==="#form")setView("form");
      else setView("landing");
    };
    onHash();
    window.addEventListener("hashchange",onHash);
    return()=>{
      window.removeEventListener("hashchange",onHash);
      if(unsub)unsub();
      if(unsubCfg)unsubCfg();
      if(unsubAg)unsubAg();
      if(unsubAuth)unsubAuth();
    };
  },[]);

  const saveCfg=async c=>{setCfg(c);await tStore(c);};
  const addReg=async r=>{
    const reg={...r,ts:new Date().toISOString()};
    if(window.__firebase){
      return await window.__firebase.addReg(reg);
    }
    return reg;
  };
  const deleteReg=async id=>{
    if(window.__firebase)await window.__firebase.deleteReg(id);
  };
  const addAgendamiento=async ag=>{
    if(window.__firebase)return await window.__firebase.addAgendamiento(ag);
  };
  const deleteAgendamiento=async id=>{
    if(window.__firebase)await window.__firebase.deleteAgendamiento(id);
  };
  const updateAgendamiento=async(id,data)=>{
    if(window.__firebase)await window.__firebase.updateAgendamiento(id,data);
  };
  const updateReg=async r=>{
    const {id,...data}=r;
    setRegs(prev=>prev.map(x=>x.id===id?{...x,...data}:x));
    if(window.__firebase)await window.__firebase.updateReg(id,data);
  };
  const nav=v=>{
    window.location.hash=v==="form"?"form":v==="admin"?"admin":"";
    setView(v);
  };
  const handleSignOut=async()=>{
    if(window.__firebase)await window.__firebase.signOut();
    // onAuthChanged se encargará de setAuthed(false) y redirigir
  };

  if(!ready||!cfg)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#8880AA",background:"#FAF8FF"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>🎊</div>
        <p>Cargando...</p>
        <p style={{fontSize:12,marginTop:8,color:"#C4BEDB"}}>Conectando con Firebase...</p>
      </div>
    </div>
  );

  const giftCounts={};
  regs.forEach(r=>{if(r.regalo)giftCounts[r.regalo]=(giftCounts[r.regalo]||0)+1;});

  if(view==="admin"&&!authed)return <AdminLogin cfg={cfg} nav={nav}/>;

  return(
    <>
      <style>{`*{box-sizing:border-box;margin:0;padding:0;}html,body{background:${cfg.bgColor};min-height:100vh;}input:focus,textarea:focus{border-color:${cfg.primaryColor}!important;box-shadow:0 0 0 3px ${cfg.primaryColor}18!important;}`}</style>
      {view==="landing"&&<Landing cfg={cfg} nav={nav} regs={regs}/>}
      {view==="form"&&<GuestForm cfg={cfg} giftCounts={giftCounts} addReg={addReg} nav={nav} regs={regs}/>}
      {view==="admin"&&authed&&<AdminPanel cfg={cfg} regs={regs} giftCounts={giftCounts} saveCfg={saveCfg} nav={nav} signOut={handleSignOut} deleteReg={deleteReg} updateReg={updateReg} agendamientos={agendamientos} addAgendamiento={addAgendamiento} deleteAgendamiento={deleteAgendamiento} updateAgendamiento={updateAgendamiento}/>}
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
