  <!-- ================================================================
    🔐 CONFIGURACIÓN DE FIREBASE
    ================================================================
    IMPORTANTE — SEGURIDAD:
    La API key de Firebase es visible en el HTML porque este archivo
    se sirve al navegador. Esto es NORMAL en Firebase (no es como una
    clave de servidor), PERO debes proteger tus datos con las Reglas
    de Firestore. Sigue estos pasos:

    1. Ve a Firebase Console → Firestore Database → "Reglas"
    2. Reemplaza las reglas con el siguiente bloque:

       rules_version = '2';
       service cloud.firestore {
         match /databases/{database}/documents {

           // Config: solo admin autenticado puede leer/escribir
           match /rsvp/config {
             allow read, write: if request.auth != null;
           }

           // Registros: cualquiera puede crear (invitados),
           // pero solo admin autenticado puede leer/editar/borrar
           match /registros/{id} {
             allow create: if true;
             allow read, update, delete: if request.auth != null;
           }

           // Agendamientos: solo admin autenticado
           match /agendamientos/{id} {
             allow read, write: if request.auth != null;
           }
         }
       }

    3. Haz clic en "Publicar".

    Además, en Firebase Console → Authentication → Settings →
    "Dominios autorizados", agrega SOLO el dominio donde alojes
    este archivo (ej: tudominio.com). Elimina cualquier dominio
    que no uses.

    Con estas reglas, aunque alguien vea la API key, no podrá
    leer ni modificar los datos sin estar autenticado como admin.
    ================================================================ -->
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ══════════════════════════════════════════════════════════════════
    // 🔥 CONFIGURA AQUÍ TUS DATOS DE FIREBASE
    // Reemplaza los valores con los de tu propio proyecto Firebase.
    // Lee el bloque de SEGURIDAD arriba antes de publicar.
    // ══════════════════════════════════════════════════════════════════
    const firebaseConfig = {
      apiKey: "AIzaSyCHEV2tl8p7g9BPfR2YHJUBNJE56fcvLY0",
      authDomain: "rsvp-boda-66d42.firebaseapp.com",
      projectId: "rsvp-boda-66d42",
      storageBucket: "rsvp-boda-66d42.firebasestorage.app",
      messagingSenderId: "956708132419",
      appId: "1:956708132419:web:56cdbe1b63efd88271e6f6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.__firebase = {
      db,
      auth,
      async signIn(email, password) {
        return signInWithEmailAndPassword(auth, email, password);
      },
      async signOut() {
        return signOut(auth);
      },
      onAuthChanged(cb) {
        return onAuthStateChanged(auth, cb);
      },
      async changePassword(currentPassword, newPassword) {
        const user = auth.currentUser;
        if (!user) throw new Error("No hay sesión activa");
        const cred = EmailAuthProvider.credential(user.email, currentPassword);
        await reauthenticateWithCredential(user, cred);
        await updatePassword(user, newPassword);
      },
      async getCfg(defaultCfg) {
        try {
          const snap = await getDoc(doc(db, "rsvp", "config"));
          return snap.exists() ? snap.data() : defaultCfg;
        } catch { return defaultCfg; }
      },
      async saveCfg(cfg) {
        try { await setDoc(doc(db, "rsvp", "config"), cfg); } catch(e) { console.error(e); }
      },
      async patchCfg(fields) {
        try { await updateDoc(doc(db, "rsvp", "config"), fields); } catch(e) {
          // If doc doesn't exist yet, create it
          try { await setDoc(doc(db, "rsvp", "config"), fields, {merge:true}); } catch(e2) { console.error(e2); }
        }
      },
      async getRegs() {
        try {
          const snap = await getDocs(collection(db, "registros"));
          return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        } catch { return []; }
      },
      async addReg(reg) {
        try {
          const docRef = await addDoc(collection(db, "registros"), reg);
          return { id: docRef.id, ...reg };
        } catch(e) { console.error(e); return null; }
      },
      async deleteReg(id) {
        try { await deleteDoc(doc(db, "registros", id)); } catch(e) { console.error(e); }
      },
      async updateReg(id, data) {
        try { await updateDoc(doc(db, "registros", id), data); } catch(e) { console.error(e); }
      },
      onRegsSnapshot(cb) {
        return onSnapshot(collection(db, "registros"), snap => {
          cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
      },
      onCfgSnapshot(cb) {
        return onSnapshot(doc(db, "rsvp", "config"), snap => {
          if(snap.exists()) cb(snap.data());
        });
      },
      async getAgendamientos() {
        try {
          const snap = await getDocs(collection(db, "agendamientos"));
          return snap.docs.map(d => ({ id: d.id, ...d.data() }));
        } catch { return []; }
      },
      async addAgendamiento(ag) {
        try {
          const docRef = await addDoc(collection(db, "agendamientos"), ag);
          return { id: docRef.id, ...ag };
        } catch(e) { console.error(e); return null; }
      },
      async deleteAgendamiento(id) {
        try { await deleteDoc(doc(db, "agendamientos", id)); } catch(e) { console.error("deleteAgendamiento error:",e); throw e; }
      },
      async updateAgendamiento(id, data) {
        try { await updateDoc(doc(db, "agendamientos", id), data); } catch(e) { console.error("updateAgendamiento error:",e); throw e; }
      },
      onAgendamientosSnapshot(cb) {
        return onSnapshot(collection(db, "agendamientos"), snap => {
          cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        });
      }
    };
    window.__firebaseReady = true;
    window.dispatchEvent(new Event("firebaseReady"));
  </script>

  <script>
    // ── Bloqueo de zoom para iOS (Safari + Chrome) ───────────────────
    // En iOS todos los navegadores usan WebKit. La clave es {capture:true}
    // para interceptar ANTES de que WebKit procese el gesto.

    const noZoom = e => { e.preventDefault(); e.stopPropagation(); };
    const noZoomIfMulti = e => {
      if (e.touches && e.touches.length > 1) { e.preventDefault(); e.stopPropagation(); }
      if (typeof e.scale !== 'undefined' && e.scale !== 1) { e.preventDefault(); e.stopPropagation(); }
    };

    const opts = { passive: false, capture: true };

    // Gestures (WebKit)
    document.addEventListener('gesturestart',  noZoom, opts);
    document.addEventListener('gesturechange', noZoom, opts);
    document.addEventListener('gestureend',    noZoom, opts);
    window.addEventListener('gesturestart',    noZoom, opts);
    window.addEventListener('gesturechange',   noZoom, opts);
    window.addEventListener('gestureend',      noZoom, opts);

    // Pinch con 2 dedos — fase de captura para llegar primero
    document.addEventListener('touchstart', noZoomIfMulti, opts);
    document.addEventListener('touchmove',  noZoomIfMulti, opts);
    window.addEventListener('touchstart',   noZoomIfMulti, opts);
    window.addEventListener('touchmove',    noZoomIfMulti, opts);

    // Doble tap
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) { e.preventDefault(); e.stopPropagation(); }
      lastTap = now;
    }, opts);

    // touch-action al body
    document.addEventListener('DOMContentLoaded', () => {
      document.body.style.touchAction = 'pan-x pan-y';
      document.documentElement.style.touchAction = 'pan-x pan-y';
    });

/* ─── FIREBASE HELPERS ───────────────────────────────────────────── */
const waitFirebase = () => new Promise(resolve => {
  if (window.__firebaseReady) { resolve(); return; }
  window.addEventListener("firebaseReady", () => resolve(), { once: true });
  setTimeout(resolve, 5000); // timeout fallback
});

const fStore = async (fb) => {
  await waitFirebase();
  if (window.__firebase) {
    const remote = await window.__firebase.getCfg(fb);
    // Always merge remote on top of defaults so new fields are never missing
    return {...fb, ...remote};
  }
  return fb;
};
const tStore = async (v) => {
  await waitFirebase();
  if (window.__firebase) await window.__firebase.saveCfg(v);
};

};

/* ─── DROPDOWN ───────────────────────────────────────────────────── */
function Dropdown({options,value,onChange,placeholder="Selecciona una opción",primaryColor="#7B6CF6",showQty=false}){
  const [open,setOpen]=useState(false);
  const [hov,setHov]=useState(null);
  const [openUp,setOpenUp]=useState(false);
  const ref=useRef(null);
  const triggerRef=useRef(null);
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[]);
  const handleToggle=()=>{
    if(!open&&triggerRef.current){
      const rect=triggerRef.current.getBoundingClientRect();
      const spaceBelow=window.innerHeight-rect.bottom;
      const spaceNeeded=Math.min(options.length*46+16,290);
      setOpenUp(spaceBelow<spaceNeeded&&rect.top>spaceNeeded);
    }
    setOpen(p=>!p);
  };
  const sel=options.find(o=>o.id===value);
  return (
    <div ref={ref} style={{position:"relative",userSelect:"none"}}>
      <div ref={triggerRef} onClick={handleToggle} style={{padding:"12px 15px",border:`2px solid ${open?primaryColor:"#E4DFF5"}`,borderRadius:13,cursor:"pointer",background:"#FFF",display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:50,transition:"all .2s",boxShadow:open?`0 0 0 3px ${primaryColor}18`:"none"}}>
        {sel?<span style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:15,fontWeight:700,color:sel.color||"#333"}}>{sel.label}</span>:<span style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:15,color:"#C4BEDB"}}>{placeholder}</span>}
        <svg width={11} height={11} viewBox="0 0 12 12" style={{transform:open?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0,marginLeft:8}}>
          <path d="M1 3l5 5 5-5" stroke={primaryColor} strokeWidth={2} fill="none" strokeLinecap="round"/>
        </svg>
      </div>
      {open&&(
        <div style={{position:"absolute",...(openUp?{bottom:"calc(100% + 6px)"}:{top:"calc(100% + 6px)"}),left:0,right:0,background:"#FFF",border:`2px solid ${primaryColor}`,borderRadius:13,boxShadow:openUp?"0 -12px 40px rgba(123,108,246,.16)":"0 12px 40px rgba(123,108,246,.16)",zIndex:9999,overflow:"hidden",maxHeight:290,overflowY:"auto",animation:"scaleIn .18s ease"}}>
          {options.map((opt,i)=>{
            const isHov=hov===opt.id&&!opt.exhausted;
            const isGiftHov=isHov&&showQty;
            return(
              <div key={opt.id}
                onMouseEnter={()=>setHov(opt.id)} onMouseLeave={()=>setHov(null)}
                onClick={()=>{if(!opt.exhausted){onChange(opt.id);setOpen(false);}}}
                style={{padding:"10px 14px",cursor:opt.exhausted?"not-allowed":"pointer",borderBottom:i<options.length-1?"1px solid #F3F0FB":"none",background:isGiftHov?`${primaryColor}0D`:isHov?"#F0EDF8":value===opt.id?`${primaryColor}10`:"#FFF",borderRadius:isHov?10:0,margin:isHov?"2px 4px":"0",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"background .18s ease, border-radius .18s ease, transform .18s ease, box-shadow .18s ease",transform:isGiftHov?"scale(1.013) translateY(-1px)":"scale(1) translateY(0)",boxShadow:isGiftHov?`0 4px 16px ${primaryColor}20`:"none",position:"relative",zIndex:isGiftHov?2:1}}>
                <span style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:value===opt.id?700:opt.exhausted?400:500,color:opt.exhausted?"#C8C4D4":(opt.color||"#333"),textDecoration:opt.exhausted?"line-through":"none"}}>
                  {opt.label}
                </span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {showQty&&opt.qty!==undefined&&(
                    <span style={{fontSize:11,fontFamily:"Plus Jakarta Sans,sans-serif",fontWeight:700,color:opt.exhausted?"#E55B5B":"#3DAB7A",background:opt.exhausted?"#FFF0F0":"#F0FFF7",padding:"2px 9px",borderRadius:20,border:`1px solid ${opt.exhausted?"#FCCECE":"#C3F0D6"}`}}>
                      {opt.qty-opt.available}/{opt.qty} disp.
                    </span>
                  )}
                  {opt.exhausted&&<span style={{fontSize:11,color:"#C4BEDB",fontFamily:"Plus Jakarta Sans,sans-serif"}}>Agotado</span>}
                  {value===opt.id&&!opt.exhausted&&(
                    <svg width={13} height={13} viewBox="0 0 14 14"><path d="M2 7l4 4 6-6" stroke={opt.color||primaryColor} strokeWidth={2.5} fill="none" strokeLinecap="round"/></svg>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


/* ─── RESPUESTAS MODAL ───────────────────────────────────────────── */
function RespuestasModal({regs,cfg,onClose}){
  const pc=cfg.primaryColor||"#7B6CF6";
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(26,21,53,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16,animation:"fadeIn .2s ease"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#FFF",borderRadius:24,padding:"28px 24px",maxWidth:500,width:"100%",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(123,108,246,.22)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:20,color:"#1A1535"}}>👀 Respuestas de todos</h3>
          <button onClick={onClose} style={{background:"#F5F2FF",border:"none",borderRadius:10,width:34,height:34,cursor:"pointer",fontSize:16,color:"#8880AA",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {regs.length===0?(
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",color:"#C4BEDB",textAlign:"center",padding:"32px 0"}}>Aún no hay respuestas registradas.</p>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {regs.map((r,i)=>{
              const [hovR,setHovR]=useState(false);
              return(
              <div key={r.id||i}
                onMouseEnter={()=>setHovR(true)} onMouseLeave={()=>setHovR(false)}
                style={{background:hovR?`${pc}0D`:"#FDFBFF",borderRadius:14,padding:"14px 16px",border:`1px solid ${hovR?`${pc}35`:"#EDE9F8"}`,cursor:"default",transition:"background .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease",transform:hovR?"scale(1.013) translateY(-1px)":"scale(1) translateY(0)",boxShadow:hovR?`0 4px 16px ${pc}20`:"none",position:"relative",zIndex:hovR?2:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:15,fontWeight:800,color:"#1A1535"}}>{r.nombre}</span>
                  <span style={{padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700,background:(r.asistiraColor||"#888")+"18",color:r.asistiraColor||"#888",whiteSpace:"nowrap",display:"inline-block"}}>Asistirá: {r.asistiraLabel||"—"}</span>
                </div>
                {r.tipoLabel&&<div style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,color:"#8880AA",marginBottom:2}}>🎁 {r.tipoLabel}{r.regaloNombre?` · ${r.regaloNombre}`:""}</div>}
                <div style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:11,color:"#C4BEDB"}}>{r.ts?new Date(r.ts).toLocaleDateString("es",{day:"2-digit",month:"short",year:"numeric"}):""}</div>
              </div>
            );})}

          </div>
        )}
        <button onClick={onClose} style={{background:`linear-gradient(135deg,${pc},${cfg.accentColor||"#F0A070"})`,color:"#FFF",border:"none",padding:"13px",borderRadius:13,width:"100%",fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:800,cursor:"pointer",marginTop:18}}>Cerrar</button>
      </div>
    </div>
  );
}

/* ─── CONFIRMATION SCREEN ────────────────────────────────────────── */
function ConfirmScreen({reg,cfg,onNew,isModal=false,onClose}){
  const [estat,setEstat]=useState("idle");
  const c=cfg;

  const [confirmResend,setConfirmResend]=useState(false);
  const resend=async()=>{
    setConfirmResend(false);
    setEstat("sending");
    try{await sendEmailJS(reg,cfg);setEstat("sent");setTimeout(()=>setEstat("idle"),3000);}
    catch{setEstat("err");setTimeout(()=>setEstat("idle"),3000);}
  };

  // Detectar mensaje personalizado
  let customMsg = "";
  const getCustomMsg = () => {
    // 1. Por asistiraId directo
    if(reg.asistiraId && c[`confirmMsg_${reg.asistiraId}`])
      return c[`confirmMsg_${reg.asistiraId}`];
    // 2. Buscar en cfg.asistira la opción que coincide con el label actual
    if(cfg.asistira && reg.asistiraLabel) {
      const opt = cfg.asistira.find(a =>
        a.label.trim() === (reg.asistiraLabel||"").trim()
      );
      if(opt && c[`confirmMsg_${opt.id}`])
        return c[`confirmMsg_${opt.id}`];
    }
    // 3. Fallback por label hardcodeado (registros muy viejos)
    if(reg.asistiraLabel==="No" && c.confirmMsgNo) return c.confirmMsgNo;
    if(reg.asistiraLabel==="Sí" && c.confirmMsgSi) return c.confirmMsgSi;
    if(reg.asistiraLabel==="No estoy seguro/a" && c.confirmMsgNoSeguro) return c.confirmMsgNoSeguro;
    // 4. Buscar cualquier clave confirmMsg_ que exista y cuyo id corresponda a alguna opción con ese label
    const allOpts = cfg.asistira || [];
    for(const opt of allOpts) {
      if((opt.label||"").trim() === (reg.asistiraLabel||"").trim()) {
        const msg = c[`confirmMsg_${opt.id}`];
        if(msg) return msg;
      }
    }
    return "";
  };
  const rawMsg = getCustomMsg();
  if(rawMsg) customMsg = rawMsg.replace(/\{\{Nombre\}\}/g, reg.nombre||"");

  const rows=[
    {label:"Nombre",val:reg.nombre},
    {label:"Correo",val:reg.email},
    {label:"¿Asistirá?",val:reg.asistiraLabel,color:reg.asistiraColor},
    {label:"Tipo de regalo",val:reg.tipoLabel,color:reg.tipoColor},
    ...(reg.regaloNombre?[{label:"Regalo escogido",val:reg.regaloNombre}]:[])
  ];

  const inner=(
    <div style={{maxWidth:460,width:"100%"}}>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{fontSize:50,marginBottom:10}}>{c.confirmEmoji||"🎉"}</div>
        <h2 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:isModal?20:24,fontWeight:700,color:c.confirmTitleColor||"#1A1535",marginBottom:7}}>{c.confirmTitle}</h2>
        {customMsg ? (
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,color:c.confirmTextColor||"#8880AA",lineHeight:1.7}}>{customMsg}</p>
        ) : (
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,color:c.confirmTextColor||"#8880AA",lineHeight:1.7}}>
            {c.confirmSubtitle} <strong style={{color:c.confirmTitleColor||"#1A1535"}}>{reg.nombre}</strong>.
          </p>
        )}
      </div>

      <div style={{background:c.confirmNoteBg||"#FFF3E8",borderRadius:12,padding:"13px 18px",marginBottom:18,border:`1.5px solid ${c.confirmNoteColor||"#F0A070"}40`}}>
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:700,color:c.confirmNoteColor||"#C05A20",textAlign:"center",lineHeight:1.55}}>{c.confirmNote}</p>
      </div>

      <div style={{background:c.confirmSummaryBg||"#F9F7FF",borderRadius:13,padding:"16px 18px",marginBottom:18}}>
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:10,fontWeight:800,color:"#9B96B8",textTransform:"uppercase",letterSpacing:".07em",marginBottom:12}}>Resumen de tu registro</p>
        {rows.map(row=>(
          <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #EDE9F8"}}>
            <span style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:"#9B96B8",fontWeight:600}}>{row.label}</span>
            <span style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:700,color:row.color||c.confirmTitleColor||"#1A1535"}}>{row.val||"—"}</span>
          </div>
        ))}
      </div>

      {reg.email&&(
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,color:"#9B96B8",textAlign:"center",marginBottom:16}}>
          {estat==="sent"?"✅ Correo enviado exitosamente":estat==="err"?"⚠️ No se pudo enviar":estat==="sending"?"Enviando correo...":cfg.ejPublicKey?"📧 Se envió un correo a tu email":""}
        </p>
      )}

      {!isModal?(
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={onNew} style={{background:c.confirmPrimaryColor||"#7B6CF6",color:"#FFF",border:"none",padding:"12px 22px",borderRadius:12,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Otra persona</button>
        </div>
      ):(
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
          {confirmResend?(
            <div style={{display:"flex",gap:8,width:"100%",justifyContent:"center"}}>
              <button onClick={resend} style={{background:"#3DAB7A",color:"#FFF",border:"none",padding:"10px 18px",borderRadius:12,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>✅ Sí, enviar</button>
              <button onClick={()=>setConfirmResend(false)} style={ghostBtn()}>Cancelar</button>
            </div>
          ):(
            <button onClick={()=>setConfirmResend(true)} disabled={estat!=="idle"} style={{background:estat==="sent"?"#3DAB7A":(c.confirmPrimaryColor||"#7B6CF6"),color:"#FFF",border:"none",padding:"11px 20px",borderRadius:12,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",opacity:estat!=="idle"?.7:1}}>
              {estat==="sending"?"Enviando...":estat==="sent"?"✅ Enviado":"📧 Reenviar correo"}
            </button>
          )}
          {onClose&&<button onClick={onClose} style={ghostBtn()}>Cerrar</button>}
        </div>
      )}
    </div>
  );

  if(isModal)return inner;
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:c.confirmBg||"#FAF8FF",padding:20}}>
      {inner}
    </div>
  );
}

      <div style={{maxWidth:460,width:"100%",position:"relative"}}>

          <h1 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:30,fontWeight:700,color:cfg.landingTitleColor||"#1A1535",marginBottom:10,lineHeight:1.2}}>{cfg.title}</h1>

          <button onClick={()=>setShowResp(true)} style={{background:"transparent",color:pc,border:`2px solid ${pc}`,padding:"14px 24px",borderRadius:16,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",width:"100%",transition:"all .2s"}}

            onMouseEnter={e=>{e.currentTarget.style.borderColor=pc;e.currentTarget.style.color=pc;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#E4DFF5";e.currentTarget.style.color="#8880AA";}}>

          </button>
        </div>
        <div style={{marginTop:26,background:"#F5F2FF",borderRadius:16,padding:18,border:"1px solid #E4DFF5"}}>
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:11,fontWeight:800,color:"#8880AA",textTransform:"uppercase",letterSpacing:".07em",marginBottom:10}}>📤 Links para compartir</p>
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,color:"#3DAB7A",fontWeight:700,marginBottom:12}}>✅ Quien abra el link irá directo al formulario</p>
          {[
            {label:"Link del formulario (compartir con invitados):",val:url+"#form",key:"form",color:pc},

/* ─── GUEST FORM ─────────────────────────────────────────────────── */
function GuestForm({cfg,giftCounts,addReg,regs}){
  const [nombre,setNombre]=useState("");
  const [nameErr,setNameErr]=useState("");
  const [email,setEmail]=useState("");
  const [emailErr,setEmailErr]=useState("");
  const [asistira,setAsistira]=useState("");
  const [tipo,setTipo]=useState("");
  const [regalo,setRegalo]=useState("");
  const [doneReg,setDoneReg]=useState(null);
  const [sending,setSending]=useState(false);
  const [showResp,setShowResp]=useState(false);

  const showGift=cfg.tipoRegalo.find(t=>t.id===tipo)?.showGift;

  // Ordenar regalos: mayor disponibilidad primero, agotados al final
  const rawGiftOpts=cfg.gifts.map(g=>{
    const used=giftCounts[g.id]||0;
    const available=Math.max(0,g.qty-used);
    return{id:g.id,label:g.name,exhausted:available===0&&g.qty>0,color:"#2D2750",qty:g.qty,available};
  });
  const giftOpts=[
    ...rawGiftOpts.filter(g=>!g.exhausted).sort((a,b)=>{
      const usedA=a.qty-a.available, usedB=b.qty-b.available;
      if(usedA===0&&usedB!==0)return -1;
      if(usedB===0&&usedA!==0)return 1;
      return usedA-usedB;
    }),
    ...rawGiftOpts.filter(g=>g.exhausted)
  ];

  const canSend=nombre.trim()&&!nameErr&&email.trim()&&!emailErr&&asistira&&tipo&&(!showGift||regalo);

  const chkName=v=>{setNombre(v);setNameErr(v&&/[^a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s]/.test(v)?"No se aceptan números o caracteres especiales, solo letras":"");};
  const chkEmail=v=>{setEmail(v);setEmailErr(v&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)?"Ingresa un correo electrónico válido":"");};

  const submit=async()=>{
    if(!canSend||sending)return;
    setSending(true);
    const ao=cfg.asistira.find(a=>a.id===asistira);
    const to=cfg.tipoRegalo.find(t=>t.id===tipo);
    const go=cfg.gifts.find(g=>g.id===regalo);
    const reg={
      nombre:nombre.trim(),email:email.trim(),
      asistiraLabel:ao?.label,asistiraColor:ao?.color,
      tipoLabel:to?.label,tipoColor:to?.color,
      regalo:showGift?regalo:null,regaloNombre:showGift?go?.name:null
    };
    const saved=await addReg(reg);
    if(cfg.ejPublicKey&&cfg.ejServiceId&&cfg.ejTemplateId){
      try{await sendEmailJS(reg,cfg);}catch{}
    }
    setSending(false);
    setDoneReg(saved||reg);
  };

  if(doneReg)return(
    <ConfirmScreen reg={doneReg} cfg={cfg} isModal={false}
      onNew={()=>{setDoneReg(null);setNombre("");setEmail("");setNameErr("");setEmailErr("");setAsistira("");setTipo("");setRegalo("");}}/>
  );

  const pc=cfg.primaryColor,bc=cfg.formBorderColor||"#E4DFF5";
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 16px",background:cfg.bgColor,animation:"fadeInUp .35s ease"}}>
      <div style={{position:"fixed",inset:0,backgroundImage:`radial-gradient(ellipse at 10% 85%, ${pc}12 0%, transparent 55%), radial-gradient(ellipse at 90% 15%, ${cfg.accentColor}10 0%, transparent 55%)`,pointerEvents:"none"}}/>
      <div style={{maxWidth:480,width:"100%",background:cfg.cardBg,borderRadius:24,padding:"34px 30px",boxShadow:"0 8px 40px rgba(123,108,246,.1)",position:"relative",zIndex:1}}>
        {/* Sin botón "Volver" */}
        <h1 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:24,fontWeight:700,color:cfg.formTitleColor||"#1A1535",marginBottom:6}}>{cfg.title}</h1>
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,color:cfg.formSubtitleColor||"#8880AA",lineHeight:1.65,marginBottom:26}}>{cfg.subtitle}</p>

        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <div>
            <label style={lbl(cfg.formLabelColor||"#9B96B8")}>Nombre completo</label>
            <input value={nombre} onChange={e=>chkName(e.target.value)} placeholder="Escribe tu nombre completo"
              style={{...inp(nameErr?"#E55B5B":bc),color:cfg.formInputColor||"#1A1535",boxShadow:nameErr?"0 0 0 3px #E55B5B18":"none"}}/>
            {nameErr&&<p style={{color:"#E55B5B",fontSize:12,marginTop:5,fontFamily:"Plus Jakarta Sans,sans-serif",fontWeight:600}}>{nameErr}</p>}
          </div>

          <div>
            <label style={lbl(cfg.formLabelColor||"#9B96B8")}>Correo electrónico</label>
            <input value={email} onChange={e=>chkEmail(e.target.value)} type="email" placeholder="ejemplo@correo.com"
              style={{...inp(emailErr?"#E55B5B":bc),color:cfg.formInputColor||"#1A1535",boxShadow:emailErr?"0 0 0 3px #E55B5B18":"none"}}/>
            {emailErr&&<p style={{color:"#E55B5B",fontSize:12,marginTop:5,fontFamily:"Plus Jakarta Sans,sans-serif",fontWeight:600}}>{emailErr}</p>}
          </div>

          <div>
            <label style={lbl(cfg.formLabelColor||"#9B96B8")}>¿Asistirá?</label>
            <Dropdown options={cfg.asistira} value={asistira} onChange={setAsistira} primaryColor={pc}/>
          </div>

          <div>
            <label style={lbl(cfg.formLabelColor||"#9B96B8")}>Tipo de regalo</label>
            <Dropdown options={cfg.tipoRegalo} value={tipo} onChange={v=>{setTipo(v);setRegalo("");}} primaryColor={pc}/>
          </div>

          {showGift&&(
            <div>
              <label style={lbl(cfg.formLabelColor||"#9B96B8")}>Regalo</label>
              <Dropdown options={giftOpts} value={regalo} onChange={setRegalo} primaryColor={pc} showQty/>
            </div>
          )}

          <button onClick={submit} disabled={!canSend||sending} style={{
            background:canSend?`linear-gradient(135deg, ${pc}, ${cfg.accentColor})`:"#EDE9F8",
            color:canSend?(cfg.formBtnTextColor||"#FFF"):"#C4BEDB",
            border:"none",padding:"17px 24px",borderRadius:14,width:"100%",
            fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:16,fontWeight:800,
            cursor:canSend?"pointer":"not-allowed",marginTop:4,
            boxShadow:canSend?`0 6px 20px ${pc}35`:"none",transition:"all .2s"
          }}>{sending?"Enviando...":"Enviar Registro"}</button>

          {/* Botón ver respuestas de otros */}
          <button onClick={()=>setShowResp(true)} style={{background:"transparent",border:`1.5px solid #E4DFF5`,color:"#8880AA",padding:"11px",borderRadius:12,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",transition:"all .2s"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=pc;e.currentTarget.style.color=pc;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#E4DFF5";e.currentTarget.style.color="#8880AA";}}>
            👀 Ver respuestas de otros ({regs.length})
          </button>
        </div>
      </div>
      {showResp&&<RespuestasModal regs={regs} cfg={cfg} onClose={()=>setShowResp(false)}/>}
    </div>
  );
}

/* ─── ADMIN LOGIN ────────────────────────────────────────────────── */
function AdminLogin({cfg,nav}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const pc=cfg.loginCircleColor||"#7B6CF6";

  const tryLogin=async(e)=>{
    e&&e.preventDefault();
    if(!email.trim()||!pass.trim()){setErr("Ingresa tu correo y contraseña");return;}
    setLoading(true);setErr("");
    try{
      await window.__firebase.signIn(email.trim(),pass);
      // onAuthStateChanged en App actualizará authed automáticamente
    }catch(ex){
      const code=ex.code||"";
      if(code.includes("user-not-found")||code.includes("wrong-password")||code.includes("invalid-credential"))
        setErr("Correo o contraseña incorrectos");
      else if(code.includes("too-many-requests"))
        setErr("Demasiados intentos. Intenta más tarde");
      else if(code.includes("invalid-email"))
        setErr("Correo no válido");
      else
        setErr("Error al iniciar sesión. Verifica tus datos");
      setLoading(false);
    }
  };

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:cfg.loginBg||"#FAF8FF"}}>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}`}</style>
      <div style={{maxWidth:360,width:"100%",background:cfg.loginCardBg||"#FFF",borderRadius:24,padding:"40px 32px",boxShadow:"0 8px 40px rgba(123,108,246,.12)",textAlign:"center"}}>
        <div style={{width:74,height:74,background:`${pc}15`,borderRadius:22,margin:"0 auto 20px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,border:`2px solid ${pc}25`}}>
          {cfg.loginEmoji||"🔐"}
        </div>
        <h2 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:22,color:cfg.loginTitleColor||"#1A1535",marginBottom:6}}>{cfg.loginTitle||"Panel de Administrador"}</h2>
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:cfg.loginSubtitleColor||"#8880AA",marginBottom:24}}>{cfg.loginSubtitle||"Ingresa con tu cuenta de administrador"}</p>
        <div style={{display:"flex",flexDirection:"column",gap:14,textAlign:"left"}}>
          <div>
            <label style={lbl()}>Correo electrónico</label>
            <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}}
              placeholder="admin@ejemplo.com" autoComplete="email"
              onKeyDown={e=>e.key==="Enter"&&tryLogin()}
              style={{...inp(),width:"100%",color:"#1A1535"}}/>
          </div>
          <div>
            <label style={lbl()}>Contraseña</label>
            <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}}
              placeholder="••••••••" autoComplete="current-password"
              onKeyDown={e=>e.key==="Enter"&&tryLogin()}
              style={{...inp(),width:"100%",color:"#1A1535"}}/>
          </div>
          {err&&<p style={{color:"#E55B5B",fontSize:13,fontFamily:"Plus Jakarta Sans,sans-serif",fontWeight:600,textAlign:"center",margin:0}}>{err}</p>}
          <button onClick={tryLogin} disabled={loading} style={{background:loading?"#EDE9F8":`linear-gradient(135deg,${pc},${pc}BB)`,color:loading?"#C4BEDB":"#FFF",border:"none",padding:"14px",borderRadius:13,width:"100%",fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:15,fontWeight:800,cursor:loading?"not-allowed":"pointer",boxShadow:loading?"none":`0 6px 20px ${pc}35`,marginTop:4}}>
            {loading?"Verificando...":cfg.loginBtnText||"Ingresar"}
          </button>
        </div>
        <button onClick={()=>nav("landing")} style={{background:"none",border:"none",cursor:"pointer",color:"#C4BEDB",fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:600,marginTop:18,display:"block",width:"100%"}}>← Volver al inicio</button>
      </div>
    </div>
  );
}

/* ─── NOTIFICATION PANEL ────────────────────────────────────────── */
function NotifPanel({regs,pendientes,onClose,onHighlightReg,onHighlightAg,apc,dismissedTs,onDismiss}){
  const [section,setSection]=useState("registros");
  const ref=useRef(null);

  useEffect(()=>{
    // Use pointerup so mobile taps inside the panel register first
    const h=e=>{
      if(ref.current&&!ref.current.contains(e.target)){
        // Small delay so any click inside fires before close
        setTimeout(onClose,50);
      }
    };
    setTimeout(()=>document.addEventListener("pointerup",h),200);
    return()=>document.removeEventListener("pointerup",h);
  },[]);

  const recent=[...regs].filter(r=>{
    if(!r.ts)return false;
    const d=new Date(r.ts).getTime();
    return d>(dismissedTs||0)&&(Date.now()-d)<86400000*2;
  }).sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,10);

  return(
    <>
      <style>{`
        .notif-panel{position:fixed;right:8px;top:70px;width:min(340px,calc(100vw - 16px));background:#FFF;border-radius:18px;box-shadow:0 12px 48px rgba(123,108,246,.22);z-index:99999;overflow:hidden;border:1px solid #EDE9F8;animation:scaleIn .18s ease;}
        @media(max-width:760px){.notif-panel{top:70px;bottom:auto;right:8px;left:8px;width:auto;border-radius:18px;}}
      `}</style>
    <div ref={ref} className="notif-panel">
      {/* Header */}
      <div style={{padding:"12px 16px",borderBottom:"1px solid #F0EDF8",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <span style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:15,color:"#1A1535",fontWeight:700}}>🔔 Notificaciones</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={onDismiss} title="Borrar todas las notificaciones" style={{background:"#FFF0F0",border:"none",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11,fontWeight:700,color:"#E55B5B",fontFamily:"Plus Jakarta Sans,sans-serif",whiteSpace:"nowrap"}}>
            🗑 Borrar
          </button>
          <button onClick={onClose} style={{background:"#F5F2FF",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",fontSize:14,color:"#8880AA"}}>✕</button>
        </div>
      </div>
      {/* Sub-tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #F0EDF8"}}>
        {[{id:"registros",label:`Nuevos registros ${recent.length>0?`(${recent.length})`:""}`},{id:"internas",label:`Recordatorios ${pendientes.length>0?`(${pendientes.length})`:""}`}].map(s=>(
          <button key={s.id} onClick={()=>setSection(s.id)} style={{flex:1,padding:"10px 8px",border:"none",cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,fontWeight:700,background:section===s.id?`${apc}10`:"#FFF",color:section===s.id?apc:"#8880AA",borderBottom:section===s.id?`2px solid ${apc}`:"2px solid transparent",transition:"all .2s"}}>
            {s.label}
          </button>
        ))}
      </div>
      {/* Content */}
      <div style={{maxHeight:320,overflowY:"auto"}}>
        {section==="registros"&&(
          recent.length===0?(
            <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:"#C4BEDB",textAlign:"center",padding:"24px 16px"}}>No hay registros recientes</p>
          ):(
            <div>
              {recent.map(r=>(
                <div key={r.id} onClick={()=>onHighlightReg(r.id)}
                  style={{padding:"12px 16px",borderBottom:"1px solid #F5F2FE",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"background .18s ease, transform .18s ease, box-shadow .18s ease"}}
                  onMouseEnter={e=>{e.currentTarget.style.background=`${apc}0D`;e.currentTarget.style.transform="scale(1.013) translateY(-1px)";e.currentTarget.style.boxShadow=`0 4px 16px ${apc}20`;e.currentTarget.style.borderRadius="10px";e.currentTarget.style.zIndex="2";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.transform="scale(1) translateY(0)";e.currentTarget.style.boxShadow="none";e.currentTarget.style.borderRadius="0";e.currentTarget.style.zIndex="1";}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:`${apc}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👤</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,color:"#1A1535",marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nombre}</p>
                    <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:11,color:"#8880AA"}}>{r.ts?new Date(r.ts).toLocaleDateString("es",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):""}</p>
                  </div>
                  <span style={{padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:700,background:(r.asistiraColor||"#888")+"18",color:r.asistiraColor||"#888",whiteSpace:"nowrap"}}>{r.asistiraLabel||"—"}</span>
                </div>
              ))}
            </div>
          )
        )}
        {section==="internas"&&(
          pendientes.length===0?(
            <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,color:"#C4BEDB",textAlign:"center",padding:"24px 16px"}}>No hay recordatorios pendientes</p>
          ):(
            <div>
              {pendientes.map(ag=>(
                <div key={ag.id} onClick={()=>onHighlightAg(ag.id)}
                  style={{padding:"12px 16px",borderBottom:"1px solid #F5F2FE",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"background .18s ease, transform .18s ease, box-shadow .18s ease"}}
                  onMouseEnter={e=>{e.currentTarget.style.background="#FFF3E8";e.currentTarget.style.transform="scale(1.013) translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 16px #F0A07020";e.currentTarget.style.borderRadius="10px";e.currentTarget.style.zIndex="2";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.transform="scale(1) translateY(0)";e.currentTarget.style.boxShadow="none";e.currentTarget.style.borderRadius="0";e.currentTarget.style.zIndex="1";}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:"#FFF3E8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>⏰</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,color:"#1A1535",marginBottom:2}}>Recordatorio listo</p>
                    <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:11,color:"#8880AA"}}>{new Date(ag.fechaHora).toLocaleDateString("es",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})} · {ag.total||0} personas</p>
                  </div>
                  <span style={{fontSize:10,color:"#F0A070",fontFamily:"Plus Jakarta Sans,sans-serif",fontWeight:700,whiteSpace:"nowrap"}}>Ver →</span>
                </div>
              ))}
            </div>
          )
        )}
      </div>
    </div>
    </>
  );
}

/* ─── ADMIN PANEL ────────────────────────────────────────────────── */
function AdminPanel({cfg,regs,giftCounts,saveCfg,nav,signOut,deleteReg,updateReg,agendamientos,addAgendamiento,deleteAgendamiento,updateAgendamiento}){
  const [tab,setTab]=useState("registros");
  const [modal,setModal]=useState(null);
  const [pendingTab,setPendingTab]=useState(null);
  const [tabDirty,setTabDirty]=useState(false);
  const apc=cfg.adminPrimaryColor||"#7B6CF6";
  const aac=cfg.adminAccentColor||"#F0A070";
  const te=cfg.adminTabEmojis||{};
  const tabs=[
    {id:"registros",label:"Registros"},
    {id:"regalos",label:"Regalos"},
    {id:"opciones",label:"Opciones"},
    {id:"diseno",label:"Diseño"},
    {id:"configuracion",label:"Config."}
  ];
  // Agendamientos pendientes (fecha ya pasó o es hoy)
  const now=new Date();
  const pendientes=agendamientos.filter(ag=>{
    if(ag.ejecutado)return false;
    const dt=new Date(ag.fechaHora);
    return dt<=now;
  });

  const [showNotifPanel,setShowNotifPanel]=useState(false);
  const [highlightedReg,setHighlightedReg]=useState(null);
  const [highlightedAg,setHighlightedAg]=useState(null);
  const [dismissedTs,setDismissedTs]=useState(()=>parseInt(localStorage.getItem("notif-dismissed")||"0"));

  // Sync dismissedTs when cfg changes (cross-device sync via Firestore)
  useEffect(()=>{
    if(cfg&&cfg.notifDismissedTs){
      const remote=cfg.notifDismissedTs;
      if(remote>dismissedTs){
        setDismissedTs(remote);
        localStorage.setItem("notif-dismissed",remote.toString());
      }
    }
  },[cfg?.notifDismissedTs]);

  const highlightReg=id=>{
    setShowNotifPanel(false);
    setHighlightedReg(id);
    setTab("registros");
    setTabDirty(false);
    setTimeout(()=>setHighlightedReg(null),3000);
  };
  const highlightAg=id=>{
    setShowNotifPanel(false);
    setTab("configuracion");
    setTabDirty(false);
    setTimeout(()=>{
      window.__goToAgendamiento&&window.__goToAgendamiento();
      setHighlightedAg(id);
      const tryScroll=(n=0)=>{
        const el=document.getElementById(`ag-row-${id}`);
        if(el){el.scrollIntoView({behavior:"smooth",block:"center"});}
        else if(n<10){setTimeout(()=>tryScroll(n+1),120);}
      };
      setTimeout(()=>tryScroll(),200);
      setTimeout(()=>setHighlightedAg(null),2200);
    },200);
  };

  const tryChangeTab=id=>{
    if(tabDirty&&id!==tab){setPendingTab(id);}
    else{setTab(id);setTabDirty(false);}
  };
  const confirmLeave=()=>{setTab(pendingTab);setPendingTab(null);setTabDirty(false);};
  const cancelLeave=()=>setPendingTab(null);

  const newRegsCount=regs.filter(r=>{const d=new Date(r.ts).getTime();return d>dismissedTs&&(Date.now()-d)<86400000*2;}).length;
  const totalBadge=pendientes.length+newRegsCount;
  const prevBadgeRef=useRef(totalBadge);
  const [bellPulse,setBellPulse]=useState(false);
  useEffect(()=>{
    if(totalBadge>prevBadgeRef.current){
      setBellPulse(true);
      setTimeout(()=>setBellPulse(false),800);
    }
    prevBadgeRef.current=totalBadge;
  },[totalBadge]);

  // ── Sticky scroll header ──
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const onScroll=()=>setScrolled(window.scrollY>110);
    window.addEventListener("scroll",onScroll,{passive:true});
    return()=>window.removeEventListener("scroll",onScroll);
  },[]);
  // Stats para sticky header: registros
  const stickyDynCards=[
    {label:"Total registros",val:regs.length,emoji:"👥",color:apc},
    ...cfg.asistira.map(a=>({label:a.label,val:regs.filter(r=>(r.asistiraLabel||"").trim()===a.label.trim()).length,emoji:"👤",color:a.color})),
    ...cfg.tipoRegalo.map(t=>({label:t.label,val:regs.filter(r=>r.tipoLabel===t.label).length,emoji:"🎁",color:t.color})),
  ];
  // Stats para sticky header: regalos
  const stickyGiftTotal=cfg.gifts.reduce((s,g)=>s+(parseInt(g.qty)||0),0);
  const stickyGiftUsed=cfg.gifts.reduce((s,g)=>s+(giftCounts[g.id]||0),0);

  const tabDefs=[
    {id:"registros",  label:"Registros", emoji:"📊"},
    {id:"regalos",    label:"Regalos",   emoji:"🎁"},
    {id:"opciones",   label:"Opciones",  emoji:"⚙️"},
    {id:"diseno",     label:"Diseño",    emoji:"🎨"},
    {id:"configuracion", label:"Config.", emoji:"🔧"}
  ].map(t=>({...t,emoji:te[t.id]||t.emoji}));

  return(
    <div style={{minHeight:"100vh",background:cfg.adminBg||"#F5F2FF"}}>
      {pendingTab&&<UnsavedAlert onStay={cancelLeave} onLeave={confirmLeave} apc={apc}/>}

        /* ── Floating sidebar ── */
        .adm-sidebar{
          width:220px;flex-shrink:0;

        }

          margin-left:244px;

          padding:28px 28px 0;
          display:flex;align-items:flex-start;justify-content:space-between;
          position:relative;z-index:40;
          background:transparent;
        }
        .adm-content{
          flex:1;padding:20px 28px 30px;overflow-x:hidden;
        }
        /* ── Sticky scroll header ── */
        .adm-sticky-hdr{
          position:fixed;top:14px;left:278px;right:18px;z-index:45;
          background:rgba(255,255,255,0.96);
          backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);

          transition:transform .32s cubic-bezier(.22,.68,0,1.15),opacity .25s ease;
        }
        .adm-sticky-hdr--hidden{transform:translateY(-130%);opacity:0;pointer-events:none;}
        .adm-sticky-hdr--visible{transform:translateY(0);opacity:1;pointer-events:auto;}
        .sticky-stats-row{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
        .sticky-stats-row::-webkit-scrollbar{display:none;}
        /* ── Mobile: hide sidebar, show float bar ── */

/* ─── EXCEL EXPORT ──────────────────────────────────────────────── */
function exportToExcelDirect(regs,filename="registros"){
  if(!window.XLSX){alert("Error: librería Excel no cargada");return;}
  const data=regs.map((r,i)=>({
    "#":i+1,
    "Nombre":r.nombre||"",
    "Correo":r.email||"",
    "¿Asistirá?":r.asistiraLabel||"",
    "Tipo de regalo":r.tipoLabel||"",
    "Regalo escogido":r.regaloNombre||"",
    "Fecha":r.ts?new Date(r.ts).toLocaleDateString("es",{day:"2-digit",month:"short",year:"numeric"}):""
  }));
  const ws=XLSX.utils.json_to_sheet(data);
  const cols=[{wch:5},{wch:25},{wch:30},{wch:18},{wch:18},{wch:30},{wch:14}];
  ws["!cols"]=cols;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Registros");
  XLSX.writeFile(wb,filename+".xlsx");
}

/* ─── SYNC REGS BUTTON ──────────────────────────────────────────── */
function SyncRegsBtn({regs,cfg,apc}){
  const [status,setStatus]=useState("idle"); // idle | syncing | done | error
  const [count,setCount]=useState(0);

  const sync=async()=>{
    if(!window.__firebase){setStatus("error");return;}
    setStatus("syncing");
    let updated=0;
    try{
      for(const r of regs){
        // Buscar la opción correcta: primero por asistiraId, luego por label
        const opt=cfg.asistira.find(a=>a.id===r.asistiraId) ||
                   cfg.asistira.find(a=>a.label.trim()===(r.asistiraLabel||"").trim());
        if(opt){
          const needsUpdate=r.asistiraLabel!==opt.label||r.asistiraColor!==opt.color||r.asistiraId!==opt.id;
          if(needsUpdate){
            await window.__firebase.updateReg(r.id,{
              asistiraLabel:opt.label,
              asistiraColor:opt.color,
              asistiraId:opt.id
            });
            updated++;
          }
        }
      }
      setCount(updated);
      setStatus("done");
      setTimeout(()=>setStatus("idle"),4000);
    }catch(e){
      setStatus("error");
      setTimeout(()=>setStatus("idle"),3000);
    }
  };

  return(
    <div style={{...cardSt(),marginBottom:16,background:"#F0F9FF",border:"1px solid #BAE0FF"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:800,color:"#0369A1",marginBottom:2}}>🔄 Sincronizar registros con opciones actuales</p>
          <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,color:"#0369A1"}}>Si cambiaste los labels en Opciones, esto actualiza todos los registros existentes.</p>
        </div>
        <button onClick={sync} disabled={status==="syncing"} style={{background:status==="done"?"#3DAB7A":status==="error"?"#E55B5B":"#0369A1",color:"#FFF",border:"none",padding:"10px 18px",borderRadius:10,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:status==="syncing"?"not-allowed":"pointer",whiteSpace:"nowrap",flexShrink:0}}>
          {status==="syncing"?"⏳ Sincronizando...":status==="done"?`✅ ${count} actualizados`:status==="error"?"❌ Error":"🔄 Sincronizar ahora"}
        </button>
      </div>
    </div>
  );
}

/* ─── BULK REMINDER PANEL ───────────────────────────────────────── */
function BulkReminderPanel({regs,cfg,addAgendamiento,apc,onClose}){
  const [selected,setSelected]=useState(new Set(regs.map(r=>r.id)));
  const [mode,setMode]=useState(null); // null | confirm | schedule
  const [fecha,setFecha]=useState("");
  const [hora,setHora]=useState("09:00");
  const [sending,setSending]=useState(false);
  const [done,setDone]=useState(false);

  const allSelected=selected.size===regs.length;
  const toggleAll=()=>setSelected(allSelected?new Set():new Set(regs.map(r=>r.id)));
  const toggle=id=>setSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

  const selectedRegs=regs.filter(r=>selected.has(r.id));

  const sendNow=async()=>{
    setSending(true);
    let ok=0,fail=0;
    for(const r of selectedRegs){
      if(!r.email)continue;

  // Scroll to highlighted reg AFTER React has rendered and committed to DOM
  useEffect(()=>{
    if(!highlightedReg)return;
    const tryScroll=(n=0)=>{
      const el=document.getElementById(`reg-row-${highlightedReg}`);
      if(el){
        // Find nearest scrollable ancestor (handles overflow-x:hidden → overflow-y:auto case)
        const getScrollParent=(node)=>{
          if(!node||node===document.documentElement)return null;
          const {overflowY,overflowX}=window.getComputedStyle(node);
          if(/(auto|scroll)/.test(overflowY)||/(auto|scroll)/.test(overflowX)){
            if(node.scrollHeight>node.clientHeight||node.scrollWidth>node.clientWidth)return node;
          }
          return getScrollParent(node.parentElement);
        };
        const container=getScrollParent(el.parentElement);
        if(container&&container!==document.documentElement){
          // Scroll the actual scrollable container
          const elRect=el.getBoundingClientRect();
          const contRect=container.getBoundingClientRect();
          const target=container.scrollTop+(elRect.top-contRect.top)-(container.clientHeight/2)+(el.offsetHeight/2);
          container.scrollTo({top:Math.max(0,target),behavior:'smooth'});
        } else {
          // window is the scroll container
          const rect=el.getBoundingClientRect();
          window.scrollTo({top:Math.max(0,rect.top+window.scrollY-window.innerHeight/2+el.offsetHeight/2),behavior:'smooth'});
        }
      }
      else if(n<20){setTimeout(()=>tryScroll(n+1),100);}
    };
    // Longer delay: iOS Safari scrolls-to-top after a focused element leaves DOM (panel close).
    // We wait 520ms to run AFTER that browser-native scroll reset.
    const t=setTimeout(()=>tryScroll(),520);
    return()=>clearTimeout(t);
  },[highlightedReg]);

/* ─── DRAFT INPUT (evita pérdida de foco en listas) ─────────────── */
function DraftInput({value,onChange,style,placeholder}){
  const [local,setLocal]=useState(value||"");
  const lastExternal=useRef(value||"");
  useEffect(()=>{
    if(value!==lastExternal.current){
      lastExternal.current=value||"";
      setLocal(value||"");
    }
  },[value]);
  const handleChange=e=>setLocal(e.target.value);
  const handleBlur=e=>{
    if(e.target.value!==lastExternal.current){
      lastExternal.current=e.target.value;
      onChange(e.target.value);
    }
  };
  return <input value={local} onChange={handleChange} onBlur={handleBlur} placeholder={placeholder||""} style={style}/>;
}

/* ─── DRAFT COLOR PICKER (para OptionsTab sin perder estado) ────── */
function DraftColorPicker({value,onChange}){
  const [local,setLocal]=useState(value||"#888888");
  const [changed,setChanged]=useState(false);
  const savedRef=useRef(value||"#888888");
  useEffect(()=>{
    if(value!==savedRef.current){savedRef.current=value||"#888888";setLocal(value||"#888888");setChanged(false);}
  },[value]);
  const accept=e=>{e.preventDefault();e.stopPropagation();savedRef.current=local;onChange(local);setChanged(false);};
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
      <input type="color" value={local} onChange={e=>{setLocal(e.target.value);setChanged(true);}}
        style={{width:44,height:44,border:`2px solid ${changed?"#7B6CF6":"#E4DFF5"}`,borderRadius:10,cursor:"pointer",padding:3,flexShrink:0}}/>
      <button onMouseDown={accept}
        style={{background:changed?"#3DAB7A":"#C4BEDB",color:"#FFF",border:"none",padding:"6px 10px",borderRadius:8,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,fontWeight:700,cursor:changed?"pointer":"default",whiteSpace:"nowrap",transition:"background .2s"}}>
        ✓
      </button>
    </div>
  );
}

/* ─── OPTIONS TAB ────────────────────────────────────────────────── */
function OptionsTab({cfg,saveCfg,apc,setTabDirty}){
  const [draft,setDraft]=useState({asistira:[...cfg.asistira],tipoRegalo:[...cfg.tipoRegalo]});
  const [dirty,setDirty]=useState(false);
  const [newT,setNewT]=useState("");
  const newTRef=useRef(null);

  useEffect(()=>{
    if(!dirty)setDraft({asistira:[...cfg.asistira],tipoRegalo:[...cfg.tipoRegalo]});
  },[cfg.asistira,cfg.tipoRegalo]);

  const upA=(id,f,v)=>{setDirty(true);setTabDirty&&setTabDirty(true);setDraft(d=>({...d,asistira:d.asistira.map(a=>a.id===id?{...a,[f]:v}:a)}));};
  const delA=id=>{setDirty(true);setDraft(d=>({...d,asistira:d.asistira.filter(a=>a.id!==id)}));};
  const [newA,setNewA]=useState("");
  const newARef=useRef(null);
  const addA=()=>{if(!newA.trim())return;setDirty(true);setDraft(d=>({...d,asistira:[...d.asistira,{id:mkId(),label:newA.trim(),color:"#888888"}]}));setNewA("");setTimeout(()=>newARef.current?.focus(),50);};

  const upT=(id,f,v)=>{setDirty(true);setDraft(d=>({...d,tipoRegalo:d.tipoRegalo.map(t=>t.id===id?{...t,[f]:v}:t)}));};
  const addT=()=>{if(!newT.trim())return;setDirty(true);setDraft(d=>({...d,tipoRegalo:[...d.tipoRegalo,{id:mkId(),label:newT.trim(),color:"#888888",showGift:true}]}));setNewT("");setTimeout(()=>newTRef.current?.focus(),50);};
  const delT=id=>{setDirty(true);setDraft(d=>({...d,tipoRegalo:d.tipoRegalo.filter(t=>t.id!==id)}));};

  const save=async()=>{
    setTabDirty&&setTabDirty(false);
    // Detectar cambios en labels de asistira para actualizar registros
    const labelChanges={};
    draft.asistira.forEach(na=>{
      const old=cfg.asistira.find(oa=>oa.id===na.id);
      if(old&&old.label!==na.label)labelChanges[old.label]={label:na.label,color:na.color};
    });
    await saveCfg({...cfg,...draft});
    // Actualizar TODOS los registros en Firebase con labels actuales
    if(window.__firebase){
      const regsSnap=await window.__firebase.getRegs();
      const idMap={};
      draft.asistira.forEach(na=>{idMap[na.id]={label:na.label,color:na.color,id:na.id};});
      const labelMap={};
      draft.asistira.forEach(na=>{
        labelMap[na.label.trim()]={label:na.label,color:na.color,id:na.id};
        const oldOpt=cfg.asistira.find(oa=>oa.id===na.id);
        if(oldOpt)labelMap[oldOpt.label.trim()]={label:na.label,color:na.color,id:na.id};
      });
      for(const r of regsSnap){
        const opt=idMap[r.asistiraId]||labelMap[(r.asistiraLabel||"").trim()];
        if(opt&&(r.asistiraLabel!==opt.label||r.asistiraColor!==opt.color||r.asistiraId!==opt.id)){
          await window.__firebase.updateReg(r.id,{asistiraLabel:opt.label,asistiraColor:opt.color,asistiraId:opt.id});
        }
      }
    }
    setDirty(false);
  };

/* ─── MODAL TEXT FIELD (para DesignTab en móvil) ────────────────── */
function ModalTextField({value,onSave,label,type,rows,placeholder}){
  const [open,setOpen]=useState(false);
  const [local,setLocal]=useState(value||"");
  const savedRef=useRef(value||"");
  const taRef=useRef(null);

  useEffect(()=>{
    if(value!==savedRef.current){savedRef.current=value||"";setLocal(value||"");}
  },[value]);

  const openModal=()=>{setLocal(savedRef.current);setOpen(true);setTimeout(()=>taRef.current?.focus(),100);};
  const save=()=>{savedRef.current=local;onSave(local);setOpen(false);};
  const cancel=()=>{setLocal(savedRef.current);setOpen(false);};

  const preview=local||placeholder||"(vacío)";
  return(
    <div style={{marginBottom:16}}>
      {label&&<label style={lbl()}>{label}</label>}
      <div onClick={openModal} style={{...inp(),cursor:"pointer",color:local?"#1A1535":"#C4BEDB",display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none"}}>
        <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:14}}>{preview}</span>
        <span style={{fontSize:14,marginLeft:8,color:"#8880AA",flexShrink:0}}>✏️</span>
      </div>
      {open&&(
        <div style={{position:"fixed",inset:0,background:"rgba(26,21,53,.6)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:99999,padding:0}}>
          <div style={{background:"#FFF",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",width:"100%",maxWidth:600,boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:16,color:"#1A1535",fontWeight:700}}>{label||"Editar texto"}</span>
              <button onClick={cancel} style={{background:"#F5F2FF",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:15,color:"#8880AA"}}>✕</button>
            </div>
            {type==="textarea"
              ?<textarea ref={taRef} value={local} onChange={e=>setLocal(e.target.value)} rows={rows||5} placeholder={placeholder||""} style={{...inp(),resize:"none",lineHeight:1.7,fontSize:16}}/>
              :<input ref={taRef} type="text" value={local} onChange={e=>setLocal(e.target.value)} placeholder={placeholder||""} style={{...inp(),fontSize:16}}/>
            }
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button onClick={save} style={{background:"#7B6CF6",color:"#FFF",border:"none",padding:"13px",borderRadius:12,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:15,fontWeight:800,cursor:"pointer",flex:1}}>✓ Guardar</button>
              <button onClick={cancel} style={{...ghostBtn(),flex:1}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── REUSABLE FIELD COMPONENTS (global = no focus loss) ────────── */
function TextField({value,onSave,label,type,rows,placeholder}){
  const [local,setLocal]=useState(value||"");
  const lastVal=useRef(value||"");
  useEffect(()=>{if(value!==lastVal.current){setLocal(value||"");lastVal.current=value||"";}}, [value]);
  const commit=e=>{if(e.target.value!==lastVal.current){lastVal.current=e.target.value;onSave(e.target.value);}};
  return(
    <div style={{marginBottom:16}}>
      {label&&<label style={lbl()}>{label}</label>}
      {type==="textarea"
        ?<textarea value={local} onChange={e=>setLocal(e.target.value)} onBlur={commit} rows={rows||2} placeholder={placeholder||""} style={{...inp(),resize:"vertical",lineHeight:1.6}}/>
        :<input type="text" value={local} onChange={e=>setLocal(e.target.value)} onBlur={commit} placeholder={placeholder||""} style={inp()}/>
      }
    </div>
  );
}
function ColorField({value,onSave,label}){
  const [local,setLocal]=useState(value||"#000000");
  const [changed,setChanged]=useState(false);
  const savedVal=useRef(value||"#000000");
  useEffect(()=>{
    if(value!==savedVal.current){
      savedVal.current=value||"#000000";
      setLocal(value||"#000000");
      setChanged(false);
    }
  },[value]);
  const handleColorChange=e=>{setLocal(e.target.value);setChanged(true);};
  const handleTextChange=e=>{setLocal(e.target.value);setChanged(true);};
  const handleAccept=e=>{
    e.preventDefault();
    e.stopPropagation();
    savedVal.current=local;
    onSave(local);
    setChanged(false);
  };
  return(
    <div style={{marginBottom:16}}>
      {label&&<label style={lbl()}>{label}</label>}
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"nowrap",width:"100%"}}>
        <input type="color" value={local}
          onChange={handleColorChange}
          style={{width:40,height:40,border:`2px solid ${changed?"#7B6CF6":"#E4DFF5"}`,borderRadius:10,cursor:"pointer",padding:2,flexShrink:0}}/>
        <input value={local} onChange={handleTextChange} style={{...inp(),flex:1,minWidth:0,borderColor:changed?"#7B6CF6":"#E4DFF5",padding:"10px 10px"}}/>
        <button
          onMouseDown={handleAccept}
          style={{background:changed?"#3DAB7A":"#C4BEDB",color:"#FFF",border:"none",padding:"10px 12px",borderRadius:9,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,cursor:changed?"pointer":"default",whiteSpace:"nowrap",transition:"background .2s",flexShrink:0}}>
          ✓
        </button>
      </div>
      {changed&&<div style={{width:24,height:24,borderRadius:6,background:local,border:"2px solid #E4DFF5",marginTop:6}}/>}
    </div>
  );
}
function EmojiField({value,onSave,label}){
  const [local,setLocal]=useState(value||"");
  useEffect(()=>setLocal(value||""),[value]);
  return(
    <div style={{marginBottom:14}}>
      {label&&<label style={lbl()}>{label}</label>}
      <input value={local} onChange={e=>setLocal(e.target.value)} onBlur={e=>onSave(e.target.value)} style={{...inp(),maxWidth:80}}/>
    </div>
  );
}

/* ─── CHANGE PASSWORD ───────────────────────────────────────────── */
function ChangePassword({apc}){
  const [cur,setCur]=useState("");
  const [newP,setNewP]=useState("");
  const [conf,setConf]=useState("");
  const [msg,setMsg]=useState(null);
  const [loading,setLoading]=useState(false);

  const handleChange=async()=>{
    if(!cur.trim()){setMsg({type:"err",text:"Ingresa tu contraseña actual"});return;}
    if(newP.length<6){setMsg({type:"err",text:"La nueva contraseña debe tener al menos 6 caracteres"});return;}
    if(newP!==conf){setMsg({type:"err",text:"Las contraseñas nuevas no coinciden"});return;}
    setLoading(true);setMsg(null);
    try{
      await window.__firebase.changePassword(cur,newP);
      setCur("");setNewP("");setConf("");
      setMsg({type:"ok",text:"✅ Contraseña cambiada exitosamente"});
      setTimeout(()=>setMsg(null),4000);
    }catch(ex){
      const code=ex.code||"";
      if(code.includes("wrong-password")||code.includes("invalid-credential"))
        setMsg({type:"err",text:"La contraseña actual es incorrecta"});
      else if(code.includes("weak-password"))
        setMsg({type:"err",text:"La nueva contraseña es demasiado débil"});
      else
        setMsg({type:"err",text:"Error al cambiar contraseña: "+ex.message});
    }finally{setLoading(false);}
  };

  return(
    <div style={{marginTop:24,borderTop:"1px solid #EDE9F8",paddingTop:20}}>
      <h4 style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:15,color:"#1A1535",marginBottom:14}}>🔑 Cambiar contraseña del panel</h4>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div>
          <label style={lbl()}>Contraseña actual</label>
          <input type="password" value={cur} onChange={e=>setCur(e.target.value)} placeholder="••••••••" autoComplete="current-password" style={inp()}/>
        </div>
        <div>
          <label style={lbl()}>Nueva contraseña (mín. 6 caracteres)</label>
          <input type="password" value={newP} onChange={e=>setNewP(e.target.value)} placeholder="••••••••" autoComplete="new-password" style={inp()}/>
        </div>
        <div>
          <label style={lbl()}>Confirmar nueva contraseña</label>
          <input type="password" value={conf} onChange={e=>setConf(e.target.value)} placeholder="••••••••" autoComplete="new-password" style={inp()}/>
        </div>
        {msg&&<p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:13,fontWeight:700,color:msg.type==="ok"?"#3DAB7A":"#E55B5B"}}>{msg.text}</p>}
        <button onClick={handleChange} disabled={loading} style={{background:loading?"#EDE9F8":apc,color:loading?"#C4BEDB":"#FFF",border:"none",padding:"12px 20px",borderRadius:12,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>{loading?"Cambiando...":"Cambiar contraseña"}</button>
      </div>
    </div>
  );
}

/* ─── EDITABLE RECIPIENTS ───────────────────────────────────────── */
function EditableRecipients({ag,updateAgendamiento,regs,apc,readOnly=false}){
  const [list,setList]=useState((ag.registros||[]).map(r=>({...r})));
  const [dirty,setDirty]=useState(false);
  const [saving,setSaving]=useState(false);
  const [saveOk,setSaveOk]=useState(false);
  const [saveErr,setSaveErr]=useState(false);
  const [newEmail,setNewEmail]=useState("");
  const [newName,setNewName]=useState("");

  // Sincronizar si ag.registros cambia desde Firestore (ej: otro dispositivo)
  useEffect(()=>{
    if(!dirty) setList((ag.registros||[]).map(r=>({...r})));
  },[ag.registros]);

  const remove=i=>{if(readOnly)return;setList(l=>l.filter((_,idx)=>idx!==i));setDirty(true);setSaveOk(false);setSaveErr(false);};
  const addManual=()=>{
    if(readOnly||!newEmail.trim())return;
    setList(l=>[...l,{id:mkId(),nombre:newName.trim()||newEmail.trim(),email:newEmail.trim()}]);
    setNewEmail("");setNewName("");setDirty(true);setSaveOk(false);setSaveErr(false);
  };
  const addFromReg=r=>{
    if(readOnly)return;
    if(list.find(x=>x.id===r.id))return;
    setList(l=>[...l,{id:r.id,nombre:r.nombre,email:r.email}]);
    setDirty(true);setSaveOk(false);setSaveErr(false);
  };
  const save=async()=>{
    if(saving)return;
    setSaving(true);setSaveErr(false);
    try{
      await updateAgendamiento(ag.id,{registros:list,total:list.length});
      setDirty(false);setSaveOk(true);
      setTimeout(()=>setSaveOk(false),3000);
    }catch(e){
      console.error(e);
      setSaveErr(true);
      setTimeout(()=>setSaveErr(false),4000);
    }
    finally{setSaving(false);}
  };

  // Registros no incluidos aún
  const notIncluded=regs.filter(r=>r.email&&!list.find(x=>x.id===r.id));

  return(
    <div style={{borderTop:"1px solid #F0EDF8",padding:"14px 16px",background:"#FDFBFF"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:11,fontWeight:800,color:"#9B96B8",textTransform:"uppercase"}}>Destinatarios ({list.length}){readOnly&&<span style={{marginLeft:8,color:"#3DAB7A",fontSize:10}}> · Solo lectura</span>}</p>
        {!readOnly&&(dirty||saveOk||saveErr)&&<button onClick={save} disabled={saving} style={{background:saveErr?"#E55B5B":saveOk?"#3DAB7A":saving?"#A0D8B3":"#3DAB7A",color:"#FFF",border:"none",padding:"6px 14px",borderRadius:8,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,fontWeight:700,cursor:saving?"not-allowed":"pointer",opacity:saving?.7:1}}>
          {saving?"⏳ Guardando...":saveErr?"❌ Error al guardar":saveOk?"✅ Guardado":"💾 Guardar cambios"}
        </button>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
        {list.map((r,i)=>(
          <div key={r.id||i} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 10px",background:"#FFF",borderRadius:8,border:"1px solid #EDE9F8"}}>

          </div>

      </div>

            {notIncluded.slice(0,8).map(r=>(
              <button key={r.id} onClick={()=>addFromReg(r)} style={{background:`${apc}10`,color:apc,border:`1px solid ${apc}30`,padding:"5px 10px",borderRadius:8,fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                + {r.nombre}

            ))}

      {/* Agregar correo manual */}
      {!readOnly&&<div>
        <p style={{fontFamily:"Plus Jakarta Sans,sans-serif",fontSize:11,fontWeight:800,color:"#9B96B8",textTransform:"uppercase",marginBottom:6}}>Agregar manualmente</p>
